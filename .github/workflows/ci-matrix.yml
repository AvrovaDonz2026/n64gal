name: ci-matrix

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Native C89 suite
        run: ./scripts/ci/run_cc_suite.sh
      - name: Publish native suite summary
        if: always()
        run: |
          if [ -f build_ci_cc/ci_suite_summary.md ]; then
            cat build_ci_cc/ci_suite_summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Verify AVX2 dirty-submit coverage
        if: always()
        run: |
          log_path="build_ci_cc/ci_logs/test_renderer_dirty_submit.log"
          if [ ! -f "$log_path" ]; then
            echo "missing dirty submit log: $log_path" >&2
            exit 1
          fi
          if ! grep -q "matched backend=avx2" "$log_path"; then
            echo "expected matched backend=avx2 in $log_path" >&2
            cat "$log_path"
            exit 1
          fi
          echo "- Verified dirty submit log on linux-x64: \`$log_path\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Verified dirty submit backend hit: \`avx2\`" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload native suite artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: suite-linux-x64
          if-no-files-found: warn
          path: |
            build_ci_cc/ci_logs
            build_ci_cc/ci_suite_summary.md
            build_ci_cc/golden_artifacts
      - name: Perf smoke suite
        env:
          VN_PERF_CFLAGS: -O2 -DNDEBUG
        run: ./scripts/ci/run_perf_smoke_suite.sh --platform-label linux-x64 --simd-backend avx2 --threshold-file tests/perf/perf_thresholds.csv --threshold-profile linux-x64-scalar-avx2-smoke --kernel-threshold-profile linux-x64-scalar-avx2-kernel-smoke --kernel-threshold-mode soft --out-dir "$RUNNER_TEMP/perf_linux_x64"
      - name: Publish perf summary
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/perf_linux_x64/perf_workflow_summary.md" ]; then
            cat "$RUNNER_TEMP/perf_linux_x64/perf_workflow_summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload perf artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-linux-x64
          if-no-files-found: warn
          path: ${{ runner.temp }}/perf_linux_x64

  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Windows suite
        shell: pwsh
        run: ./scripts/ci/run_windows_suite.ps1 -PlatformLabel windows-x64 -CMakePlatform x64 -SuiteRoot build_ci_windows_x64
      - name: Publish suite summary
        if: always()
        shell: pwsh
        run: |
          $SummaryPath = Join-Path 'build_ci_windows_x64' 'ci_suite_summary.md'
          if (Test-Path $SummaryPath) {
            Get-Content $SummaryPath | Add-Content $env:GITHUB_STEP_SUMMARY
          }
      - name: Verify AVX2 dirty-submit coverage
        if: always()
        shell: pwsh
        run: |
          $LogPath = Join-Path 'build_ci_windows_x64' 'ci_logs/test_renderer_dirty_submit.log'
          if (-not (Test-Path $LogPath)) {
            throw "missing dirty submit log: $LogPath"
          }
          if (-not (Select-String -Path $LogPath -Pattern 'matched backend=avx2' -Quiet)) {
            Get-Content $LogPath
            throw "expected matched backend=avx2 in $LogPath"
          }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Verified dirty submit log on windows-x64: $LogPath"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Verified dirty submit backend hit: avx2"
      - name: Upload suite artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: suite-windows-x64
          if-no-files-found: warn
          path: |
            build_ci_windows_x64/ci_logs
            build_ci_windows_x64/ci_suite_summary.md
            build_ci_windows_x64/golden_artifacts
      - name: Perf smoke suite
        shell: bash
        run: ./scripts/ci/run_perf_smoke_suite.sh --platform-label windows-x64 --simd-backend avx2 --skip-build --runner-bin build/Release/vn_player.exe --threshold-file tests/perf/perf_thresholds.csv --threshold-profile windows-x64-scalar-avx2-smoke --kernel-threshold-profile windows-x64-scalar-avx2-kernel-smoke --kernel-threshold-mode soft --jitter-scenes S3 --jitter-duration-sec 10 --jitter-warmup-sec 2 --jitter-repeat-count 5 --out-dir build_ci_perf_windows_x64
      - name: Publish perf summary
        if: always()
        shell: pwsh
        run: |
          $SummaryPath = Join-Path 'build_ci_perf_windows_x64' 'perf_workflow_summary.md'
          if (Test-Path $SummaryPath) {
            Get-Content $SummaryPath | Add-Content $env:GITHUB_STEP_SUMMARY
          }
      - name: Upload perf artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-windows-x64
          if-no-files-found: warn
          path: build_ci_perf_windows_x64

  linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Native C89 suite
        run: ./scripts/ci/run_cc_suite.sh
      - name: Publish native suite summary
        if: always()
        run: |
          if [ -f build_ci_cc/ci_suite_summary.md ]; then
            cat build_ci_cc/ci_suite_summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Verify NEON dirty-submit coverage
        if: always()
        run: |
          log_path="build_ci_cc/ci_logs/test_renderer_dirty_submit.log"
          if [ ! -f "$log_path" ]; then
            echo "missing dirty submit log: $log_path" >&2
            exit 1
          fi
          if ! grep -q "matched backend=neon" "$log_path"; then
            echo "expected matched backend=neon in $log_path" >&2
            cat "$log_path"
            exit 1
          fi
          echo "- Verified dirty submit log on linux-arm64: \`$log_path\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Verified dirty submit backend hit: \`neon\`" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload native suite artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: suite-linux-arm64
          if-no-files-found: warn
          path: |
            build_ci_cc/ci_logs
            build_ci_cc/ci_suite_summary.md
            build_ci_cc/golden_artifacts
      - name: Perf smoke suite
        env:
          VN_PERF_CFLAGS: -O2 -DNDEBUG
        run: ./scripts/ci/run_perf_smoke_suite.sh --platform-label linux-arm64 --simd-backend neon --threshold-file tests/perf/perf_thresholds.csv --threshold-profile linux-arm64-scalar-neon-smoke --out-dir build_ci_perf_linux_arm64
      - name: Publish perf summary
        if: always()
        run: |
          if [ -f build_ci_perf_linux_arm64/perf_workflow_summary.md ]; then
            cat build_ci_perf_linux_arm64/perf_workflow_summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload perf artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-linux-arm64
          if-no-files-found: warn
          path: build_ci_perf_linux_arm64

  windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - name: Windows suite
        shell: pwsh
        run: ./scripts/ci/run_windows_suite.ps1 -PlatformLabel windows-arm64 -CMakePlatform ARM64 -SuiteRoot build_ci_windows_arm64
      - name: Publish suite summary
        if: always()
        shell: pwsh
        run: |
          $SummaryPath = Join-Path 'build_ci_windows_arm64' 'ci_suite_summary.md'
          if (Test-Path $SummaryPath) {
            Get-Content $SummaryPath | Add-Content $env:GITHUB_STEP_SUMMARY
          }
      - name: Verify NEON dirty-submit coverage
        if: always()
        shell: pwsh
        run: |
          $LogPath = Join-Path 'build_ci_windows_arm64' 'ci_logs/test_renderer_dirty_submit.log'
          if (-not (Test-Path $LogPath)) {
            throw "missing dirty submit log: $LogPath"
          }
          if (-not (Select-String -Path $LogPath -Pattern 'matched backend=neon' -Quiet)) {
            Get-Content $LogPath
            throw "expected matched backend=neon in $LogPath"
          }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Verified dirty submit log on windows-arm64: $LogPath"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Verified dirty submit backend hit: neon"
      - name: Upload suite artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: suite-windows-arm64
          if-no-files-found: warn
          path: |
            build_ci_windows_arm64/ci_logs
            build_ci_windows_arm64/ci_suite_summary.md
            build_ci_windows_arm64/golden_artifacts
      - name: Perf smoke suite
        shell: bash
        run: ./scripts/ci/run_perf_smoke_suite.sh --platform-label windows-arm64 --simd-backend neon --skip-build --runner-bin build/Release/vn_player.exe --threshold-file tests/perf/perf_thresholds.csv --threshold-profile windows-arm64-scalar-neon-smoke --out-dir build_ci_perf_windows_arm64
      - name: Publish perf summary
        if: always()
        shell: pwsh
        run: |
          $SummaryPath = Join-Path 'build_ci_perf_windows_arm64' 'perf_workflow_summary.md'
          if (Test-Path $SummaryPath) {
            Get-Content $SummaryPath | Add-Content $env:GITHUB_STEP_SUMMARY
          }
      - name: Upload perf artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-windows-arm64
          if-no-files-found: warn
          path: build_ci_perf_windows_arm64

  linux-riscv64-cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install riscv64 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu libc6-dev-riscv64-cross
      - name: Cross build riscv64
        run: ./scripts/ci/build_riscv64_cross.sh

  linux-riscv64-qemu-scalar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install riscv64 qemu toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu libc6-dev-riscv64-cross qemu-user
      - name: QEMU scalar smoke
        run: ./scripts/ci/run_riscv64_qemu_suite.sh --skip-rvv
      - name: Publish qemu scalar suite summary
        if: always()
        run: |
          if [ -f build_ci_riscv64/ci_suite_summary.md ]; then
            cat build_ci_riscv64/ci_suite_summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload qemu scalar suite artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: suite-linux-riscv64-qemu-scalar
          if-no-files-found: warn
          path: |
            build_ci_riscv64/ci_logs
            build_ci_riscv64/ci_suite_summary.md
            build_ci_riscv64/golden_artifacts

  linux-riscv64-qemu-rvv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install riscv64 qemu toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu libc6-dev-riscv64-cross qemu-user
      - name: QEMU RVV smoke
        run: ./scripts/ci/run_riscv64_qemu_suite.sh --require-rvv
      - name: Publish qemu RVV suite summary
        if: always()
        run: |
          if [ -f build_ci_riscv64/ci_suite_summary.md ]; then
            cat build_ci_riscv64/ci_suite_summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload qemu RVV suite artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: suite-linux-riscv64-qemu-rvv
          if-no-files-found: warn
          path: |
            build_ci_riscv64/ci_logs
            build_ci_riscv64/ci_suite_summary.md
            build_ci_riscv64/golden_artifacts
